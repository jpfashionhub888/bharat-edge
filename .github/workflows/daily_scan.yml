name: Bharat Edge Daily Scan

on:
  schedule:
    - cron: '40 3 * * 1-5'   # 9:10 AM IST
    - cron: '0 7 * * 1-5'    # 12:30 PM IST
    - cron: '45 9 * * 1-5'   # 3:15 PM IST
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance pandas numpy scikit-learn
          pip install xgboost lightgbm requests

      - name: Run Bharat Edge Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python bharat_cloud_scan.py

      - name: Save trading state and generate dashboard
        if: always()
        run: |
          git config --global user.email "alphaedge-bot@github.com"
          git config --global user.name "AlphaEdge Bot"
          mkdir -p logs
          mkdir -p docs
          python generate_dashboard.py || true
          git add -f logs/paper_trades.json || true
          git add -f logs/latest_signals.json || true
          git add -f logs/sectors.json || true
          git add -f logs/earnings.json || true
          git add -f docs/index.html || true
          git diff --staged --quiet || git commit -m "Auto: Trading state + dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bharat-scan-${{ github.run_number }}
          path: logs/
          retention-days: 30
